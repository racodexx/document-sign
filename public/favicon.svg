<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Document background -->
  <rect x="12" y="8" width="40" height="48" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Document lines -->
  <line x1="18" y1="18" x2="42" y2="18" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="26" x2="46" y2="26" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="34" x2="46" y2="34" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  
